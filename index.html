<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tome of Quotes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Shadows+Into+Light&family=Patrick+Hand&family=Caveat:wght@400;700&family=Indie+Flower&family=Kalam:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Times New Roman', serif;
        }

        .scene {
            position: relative;
            transform: translateY(-8vh);
        }

        /* ── Side Menu ─────────────────────────────────────────── */
        .menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 260px;
            height: 100vh;
            background: linear-gradient(135deg, #1a1209 0%, #2a1a0a 50%, #1a1209 100%);
            border-right: 2px solid #5a3a1a;
            z-index: 300;
            display: flex;
            flex-direction: column;
            padding: 18px 16px;
            gap: 18px;
            transition: transform 0.35s ease;
            box-shadow: 4px 0 20px rgba(0,0,0,0.6);
        }
        .menu.collapsed {
            transform: translateX(-260px);
        }
        .menu-toggle {
            position: absolute;
            top: 10px;
            right: -36px;
            width: 32px;
            height: 32px;
            background: #2a1a0a;
            border: 1px solid #5a3a1a;
            border-left: none;
            border-radius: 0 6px 6px 0;
            color: #c4a265;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .menu-toggle:hover {
            background: #3a2a1a;
        }
        .menu.collapsed .menu-toggle {
            right: -36px;
        }
        .menu h2 {
            color: #c4a265;
            font-family: 'Palatino Linotype', serif;
            font-size: 16px;
            margin-bottom: 2px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .menu-section {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .menu-section label {
            color: #a08050;
            font-family: 'Palatino Linotype', serif;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .menu input[type="text"] {
            background: #0e0a05;
            border: 1px solid #5a3a1a;
            color: #d4b87a;
            padding: 7px 10px;
            border-radius: 4px;
            font-size: 13px;
            font-family: 'Palatino Linotype', serif;
            outline: none;
            width: 100%;
        }
        .menu input[type="text"]:focus {
            border-color: #c4a265;
        }
        .menu input[type="text"]::placeholder {
            color: #6a5030;
        }
        .menu input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: #0e0a05;
            border-radius: 3px;
            outline: none;
            border: 1px solid #5a3a1a;
        }
        .menu input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: #c4a265;
            border-radius: 50%;
            cursor: pointer;
        }
        .menu input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            background: #c4a265;
            border-radius: 50%;
            border: none;
            cursor: pointer;
        }
        .menu select {
            background: #0e0a05;
            border: 1px solid #5a3a1a;
            color: #d4b87a;
            padding: 7px 10px;
            border-radius: 4px;
            font-size: 13px;
            outline: none;
            width: 100%;
            cursor: pointer;
        }
        .menu select:focus {
            border-color: #c4a265;
        }
        .menu select option {
            background: #0e0a05;
            color: #d4b87a;
        }
        .menu select optgroup {
            background: #1a1209;
            color: #c4a265;
            font-style: normal;
        }
        .menu-btn {
            background: linear-gradient(180deg, #3a2a1a 0%, #2a1a0a 100%);
            border: 1px solid #5a3a1a;
            color: #c4a265;
            padding: 9px 14px;
            border-radius: 4px;
            font-size: 13px;
            font-family: 'Palatino Linotype', serif;
            cursor: pointer;
            text-align: center;
            transition: background 0.2s, border-color 0.2s;
            letter-spacing: 0.5px;
        }
        .menu-btn:hover {
            background: linear-gradient(180deg, #4a3a2a 0%, #3a2a1a 100%);
            border-color: #c4a265;
        }
        .size-display {
            color: #c4a265;
            font-family: 'Palatino Linotype', serif;
            font-size: 12px;
            text-align: center;
            min-width: 36px;
        }
        .slider-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .search-row {
            display: flex;
            gap: 6px;
        }
        .search-row .search-wrap {
            flex: 1;
            position: relative;
            display: flex;
        }
        .search-row input {
            flex: 1;
            padding-right: 22px;
        }
        .search-clear {
            position: absolute;
            right: 5px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #8a6a4a;
            font-size: 14px;
            line-height: 1;
            padding: 0;
            display: none;
        }
        .search-clear:hover { color: #c0392b; }
        .search-row .menu-btn {
            padding: 7px 10px;
            font-size: 12px;
            white-space: nowrap;
        }
        .search-info {
            color: #a08050;
            font-family: 'Palatino Linotype', serif;
            font-size: 11px;
            min-height: 16px;
        }
        .menu-divider {
            border: none;
            border-top: 1px solid #3a2a1a;
            margin: 2px 0;
        }

        /* ── Checkbox styling ───────────────────────── */
        .menu input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border: 1px solid #7a5a2a;
            border-radius: 3px;
            background: #1a1209;
            cursor: pointer;
            flex-shrink: 0;
            position: relative;
            vertical-align: middle;
        }
        .menu input[type="checkbox"]:checked {
            background: #c4a265;
            border-color: #c4a265;
        }
        .menu input[type="checkbox"]:checked::after {
            content: '';
            position: absolute;
            left: 2px;
            top: -1px;
            width: 4px;
            height: 8px;
            border: 2px solid #1a1209;
            border-top: none;
            border-left: none;
            transform: rotate(45deg);
        }

        /* ── Line prefix highlighting ───────────────────── */
        .line-prefix {
            border-radius: 3px;
            padding: 0 3px;
            transition: background-color 0.15s, color 0.15s;
            cursor: default;
        }
        .line-prefix:hover {
            background-color: var(--prefix-bg);
            color: var(--prefix-color);
        }
        .conv-badge {
            display: inline-block;
            border-radius: 3px;
            padding: 0 3px;
            margin-left: 3px;
            font-size: 0.8em;
            background: #5a3e28;
            color: #e8d9b0;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
        }
        .conv-badge:hover {
            background: #7a5a3a;
        }

        .scene {
            perspective: 2000px;
        }

        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Times New Roman', serif;
        }

        .book {
            position: relative;
            cursor: pointer;
        }
        .book.busy {
            pointer-events: none;
        }

        .book .base {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: center center;
        }

        /* ── Text overlay on open book ─────────────────────────── */
        .page-text {
            position: absolute;
            overflow: hidden;
            color: #2a1a0a;
            font-family: 'Times New Roman', serif;
            font-size: 14px;
            line-height: 1.45;
            white-space: pre-wrap;
            word-wrap: break-word;
            pointer-events: auto;
            user-select: text;
            -webkit-user-select: text;
            cursor: text;
            z-index: 4;
        }
        .page-text.left {
            top: 14.6%;
            left: 15.6%;
            width: 31.7%;
            height: 51%;
            padding: 0.5% 1%;
        }
        .page-text.right {
            top: 14.6%;
            left: 54.5%;
            width: 31.7%;
            height: 51%;
            padding: 0.5% 1%;
        }



        /* ── Flip animation layers ─────────────────────────────── */
        .flip-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 2;
        }
        .flip-layer img {
            width: 100%; height: 100%;
            object-fit: contain;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            transform-origin: 50% 50%;
        }
        .flip-layer .page-text {
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            transform-origin: 50% 50%;
        }

        .spine-shadow {
            position: absolute;
            top: 0;
            left: 42%;
            width: 16%;
            height: 100%;
            background: radial-gradient(ellipse at center, rgba(0, 0, 0, 0.4) 0%, transparent 70%);
            pointer-events: none;
            z-index: 3;
        }

        .sweep-shadow {
            position: absolute;
            top: 5%;
            height: 90%;
            pointer-events: none;
            z-index: 3;
        }

        #mobileReader {
            top: 0; right: 0; bottom: 0; left: 0;
            transition: left 0.35s ease, background 0.3s ease;
        }
        #mobileReader.reader-shifted {
            left: 260px;
        }
        #mobileReaderText {
            transition: color 0.3s ease;
        }
    </style>
</head>
<body>
    <!-- ── Side Menu ──────────────────────────────────────── -->
    <div class="menu" id="sideMenu">
        <button class="menu-toggle" id="menuToggle" title="Toggle menu">◀</button>

        <h2>⚙ Tome Tools</h2>
        <hr class="menu-divider">

        <div class="menu-section" style="flex-direction:row; align-items:center; justify-content:space-between;">
            <label style="margin:0;">View</label>
            <div style="display:flex; gap:4px;">
                <button class="menu-btn" id="modeTomeBtn" style="padding:5px 10px; font-size:12px;">Tome</button>
                <button class="menu-btn" id="modeReaderBtn" style="padding:5px 10px; font-size:12px;">Reader</button>
            </div>
        </div>
        <hr class="menu-divider">

        <div class="menu-section" id="readerAlignSection" style="display:none; flex-direction:row; align-items:center; justify-content:space-between;">
            <label style="margin:0;">Alignment</label>
            <button class="menu-btn" id="readerAlignBtn" style="padding:5px 10px; font-size:12px;">Left</button>
        </div>

        <div class="menu-section" id="readerDarkSection" style="display:none; flex-direction:row; align-items:center; justify-content:space-between;">
            <label style="margin:0;">Theme</label>
            <button class="menu-btn" id="readerDarkBtn" style="padding:5px 10px; font-size:12px;">Light</button>
        </div>
        <hr class="menu-divider" id="readerDarkDivider" style="display:none;">

        <div class="menu-section">
            <label>Search</label>
            <div class="search-row">
                <div class="search-wrap">
                    <input type="text" id="searchInput" placeholder="Search text...">
                    <button class="search-clear" id="searchClear" tabindex="-1">&times;</button>
                </div>
                <button class="menu-btn" id="searchBtn">Go</button>
            </div>
            <div style="margin-top:6px; display:flex; align-items:center; gap:7px;">
                <input type="checkbox" id="hideUnknownChars" checked>
                <label for="hideUnknownChars" style="color:#a08050; font-size:12px; cursor:pointer; user-select:none;">Hide unknown characters</label>
            </div>
            <div style="margin-top:4px; display:flex; align-items:center; gap:7px;">
                <input type="checkbox" id="hideEventRefs" checked>
                <label for="hideEventRefs" style="color:#a08050; font-size:12px; cursor:pointer; user-select:none;">Hide event references</label>
            </div>
            <div class="search-info" id="searchInfo"></div>
        </div>

        <hr class="menu-divider">

        <div class="menu-section">
            <label>Character</label>
            <select id="charFilter">
                <option value="all" selected>All</option>
                <optgroup label="Ubersreik Five">
                    <option value="u5">All Five</option>
                    <option value="pes">Kruber</option>
                    <option value="pwh">Saltzpyre</option>
                    <option value="pbw">Sienna</option>
                    <option value="pwe">Kerillian</option>
                    <option value="pdr">Bardin</option>
                </optgroup>
                <optgroup label="NPCs">
                    <option value="nfl">Franz Lohner</option>
                    <option value="nco">Cousin Okri</option>
                    <option value="npp">Catrinne of Aldenstein</option>
                    <option value="nsf">Sofia Fuegonasus</option>
                    <option value="nde">Hedda Bardinsdottir</option>
                </optgroup>
                <optgroup label="Bosses">
                    <option value="ebh">Burblespue Halescourge</option>
                    <option value="egs">Rasknitt</option>
                    <option value="ecc">Bödvarr Ribspreader</option>
                    <option value="ewl">Skarrik Spinemanglr</option>
                    <option value="nngl">Nurgloth the Eternal</option>
                </optgroup>
                <optgroup label="Enemies">
                    <option value="egt">Gutter Runner</option>
                    <option value="epg">Globadier</option>
                    <option value="epm">Packmaster</option>
                    <option value="erg">Ratling Gunner</option>
                    <option value="ewt">Warpfire Thrower</option>
                </optgroup>
                <optgroup label="Misc">
                    <option value="ncv">Villager</option>
                    <option value="ndw">Nameless Voice</option>
                    <option value="npcr1">Dwarven Heroes</option>
                    <option value="unknown">Unknown</option>
                </optgroup>
            </select>
        </div>

        <hr class="menu-divider">

        <div class="menu-section">
            <label>Prefix</label>
            <select id="prefixSelect">
                <option value="event">Event Name</option>
                <option value="name" selected>Character Name</option>
                <option value="initials">Character Initials</option>
            </select>
        </div>

        <hr class="menu-divider">

        <div class="menu-section">
            <label>Text Size &nbsp;<span id="fontSizeDisplay" style="color:#c4a265;">14px</span></label>
            <input type="range" id="fontSizeSlider" min="8" max="34" step="1" value="14">
        </div>

        <hr class="menu-divider">

        <div class="menu-section">
            <button class="menu-btn" id="downloadBtn">⬇ Download Tome of Quotes</button>
        </div>

        <hr class="menu-divider">

        <div class="menu-section">
            <button class="menu-btn" id="downloadCurrentBtn">⬇ Download Current Text</button>
        </div>
    </div>

    <div class="scene">
        <div class="book" id="book">
            <img class="base" id="baseImg" alt="Vermintide Tome">
            <div class="page-text left" id="textLeft"></div>
            <div class="page-text right" id="textRight"></div>
        </div>
    </div>

    <!-- ── Mobile Reader ─────────────────────────────────── -->
    <div id="mobileReader" style="display:none; position:fixed; z-index:200; background:#f0e0c0; flex-direction:column;">
        <div style="display:flex; align-items:center; justify-content:center; padding:8px 12px; background:#2a1a0a; border-bottom:2px solid #5a3a1a; flex-shrink:0;">
            <span style="color:#c4a265; font-family:'Palatino Linotype',serif; font-size:15px; font-weight:bold; letter-spacing:1px;">Tome of Quotes</span>
        </div>
        <div id="mobileReaderText" style="flex:1; overflow:hidden; padding:14px 16px; color:#2a1a0a; white-space:pre-wrap; word-wrap:break-word; line-height:1.45; font-family:'Times New Roman',serif; user-select:text; -webkit-user-select:text;"></div>
        <div style="display:flex; align-items:center; padding:8px 12px; background:#2a1a0a; border-top:2px solid #5a3a1a; gap:8px; flex-shrink:0;">
            <button id="mobilePrev" style="background:#3a2a1a; border:1px solid #5a3a1a; color:#c4a265; padding:7px 18px; border-radius:4px; font-size:18px; cursor:pointer;">&#9664;</button>
            <span id="mobilePageLabel" style="flex:1; text-align:center; color:#a08050; font-size:12px; font-family:'Palatino Linotype',serif;"></span>
            <button id="mobileNext" style="background:#3a2a1a; border:1px solid #5a3a1a; color:#c4a265; padding:7px 18px; border-radius:4px; font-size:18px; cursor:pointer;">&#9654;</button>
        </div>
    </div>

    <script>
    (function () {
        var IMAGES = {
            closed:    'tome_closed.png',
            firstPage: 'tome_first_page.png',
            open:      'tome_open.png',
            lastPage:  'tome_last_page.png'
        };

        var TEXT_FILE = 'Tome of Quotes.txt';
        var allLines = [];   // raw lines from file
        var FONT_SIZE = 14;   // matches CSS default
        var FONT_FAMILY = "'Times New Roman', serif";  // fixed, matches CSS
        var searchMode = false;
        var searchResults = [];
        var prefixMode = 'name'; // 'event' | 'name' | 'initials'
        var charFilterPrefix = 'all'; // 'all' | 'pbw' | 'pwh' | 'pes' | 'pwe' | 'pdr'

        var CHAR_MAP = {
            pbw: { name: 'Sienna',    initials: 'SF', color: '#c0392b' },
            pwh: { name: 'Saltzpyre', initials: 'VS', color: '#1a1a1a', textColor: '#ffffff' },
            pes: { name: 'Kruber',    initials: 'MK', color: '#2e6da4' },
            pwe: { name: 'Kerillian', initials: 'K',  color: '#27ae60' },
            pdr: { name: 'Bardin',    initials: 'BG', color: '#1a6e3a' },
            pbr: { name: 'Bardin',    initials: 'BG', color: '#1a6e3a' },
            pwb: { name: 'Sienna',    initials: 'SF', color: '#c0392b' },
            // Extended prefixes
            nfl: { name: 'Franz Lohner', initials: 'FL', color: '#bfa76f' },
            nik: { name: 'Franz Lohner', initials: 'FL', color: '#bfa76f' },
            npces: { name: 'Franz Lohner', initials: 'FL', color: '#bfa76f' },
            ebh: { name: 'Burblespue Halescourge', initials: 'BH', color: '#7e57c2' },
            ecc: { name: 'Bödvarr Ribspreader', initials: 'BR', color: '#a0522d' },
            egs: { name: 'Rasknitt', initials: 'RN', color: '#607d8b' },
            egt: { name: 'Gutter Runner', initials: 'GR', color: '#616161' },
            epg: { name: 'Globadier', initials: 'GB', color: '#388e3c' },
            epm: { name: 'Packmaster', initials: 'PM', color: '#8d6e63' },
            erg: { name: 'Ratling Gunner', initials: 'RG', color: '#455a64' },
            ewl: { name: 'Skarrik Spinemanglr', initials: 'SS', color: '#bdb76b' },
            ewt: { name: 'Warpfire Thrower', initials: 'WT', color: '#ff7043' },
            nco: { name: 'Cousin Okri', initials: 'CO', color: '#ffd700' },
            ncv: { name: 'Villager', initials: 'CV', color: '#bdbdbd' },
            ncv1: { name: 'Villager', initials: 'CV', color: '#bdbdbd' },
            ncv2: { name: 'Villager', initials: 'CV', color: '#bdbdbd' },
            ndw: { name: 'Nameless Voice', initials: 'NV', color: '#607d8b' },
            nwd: { name: 'Nameless Voice', initials: 'NV', color: '#607d8b' },
            nngl: { name: 'Nurgloth the Eternal', initials: 'NE', color: '#388e3c' },
            npcr1: { name: 'Dwarven Heroes', initials: 'DH', color: '#b0bec5' },
            npp: { name: 'Catrinne of Aldenstein', initials: 'CA', color: '#f06292' },
            nsf: { name: 'Sofia Fuegonasus', initials: 'SOF', color: '#ffb300' },
            nde: { name: 'Hedda Bardinsdottir', initials: 'HB', color: '#b8860b' },
            vmg: { name: 'Versus Skaven', initials: 'VS', color: '#616161' }
        };

        // States: 'closed' | 'first_page' | 'content' | 'last_page'
        var state = 'closed';
        var contentSpread = 0;   // which two-page spread we're on (0-based)
        var lineStarts = [0];    // lineStarts[i] = index in active lines where spread i starts
        var lastContentSpread = 0; // updated when we know the last spread
        var busy = false;
        var viewMode = 'tome'; // 'tome' | 'reader' — set after init
        var readerCentered = false;
        var readerDark = false;
        var savedLineIdx = -1; // remembered position when switching views (-1 = initial/intro state)
        var mobilePageStarts = [0];
        var mobilePage = 0;

        var book     = document.getElementById('book');
        var baseImg  = document.getElementById('baseImg');
        var textL    = document.getElementById('textLeft');
        var textR    = document.getElementById('textRight');

        // ── Preload images ──────────────────────────────────────
        var openW = 0, openH = 0;

        function preloadImages() {
            var srcs = Object.values(IMAGES);
            return Promise.all(srcs.map(function (src) {
                return new Promise(function (resolve) {
                    var img = new Image();
                    img.onload = function () {
                        if (src !== IMAGES.closed) {
                            openW = Math.max(openW, img.naturalWidth);
                            openH = Math.max(openH, img.naturalHeight);
                        }
                        resolve();
                    };
                    img.onerror = resolve;
                    img.src = src;
                });
            }));
        }

        // ── Load & paginate text ────────────────────────────────
        function loadText() {
            return fetch(TEXT_FILE)
                .then(function (r) {
                    if (!r.ok) throw new Error('Failed to load ' + TEXT_FILE);
                    return r.text();
                })
                .then(function (raw) {
                    allLines = raw.split(/\r?\n/);
                    resetPagination();
                })
                .catch(function (err) {
                    console.error(err);
                    allLines = ['', '', 'Error: Could not load text file.', err.message];
                    resetPagination();
                });
        }


        // Hide event references logic
        function isEventReferenceLine(line) {
            // Looks for lines like: ...: "<event_name>"
            var colonIdx = line.indexOf(': ');
            if (colonIdx === -1) return false;
            var dialogue = line.substring(colonIdx + 2).trim();
            return dialogue.startsWith('"<') && dialogue.endsWith('>"');
        }

        var ALL_PREFIXES = Object.keys(CHAR_MAP);
        var U5_PREFIXES = ['pes','pwh','pbw','pwe','pdr'];
        var MULTI_PREFIXES = { ncv: ['ncv','ncv1','ncv2'], ndw: ['ndw','nwd'] };

        function getLinePrefix(line) {
            var underIdx = line.indexOf('_');
            var colonIdx = line.indexOf(': ');
            var end = (underIdx !== -1 && (colonIdx === -1 || underIdx < colonIdx)) ? underIdx : colonIdx;
            return end !== -1 ? line.substring(0, end).toLowerCase() : '';
        }

        function filterByChar(lines) {
            var filtered = lines;
            if (charFilterPrefix === 'u5') {
                filtered = filtered.filter(function(line) {
                    return U5_PREFIXES.includes(getLinePrefix(line));
                });
            } else if (charFilterPrefix === 'unknown') {
                filtered = filtered.filter(function(line) {
                    var p = getLinePrefix(line);
                    return p && !CHAR_MAP[p];
                });
            } else if (charFilterPrefix !== 'all') {
                var allowed = MULTI_PREFIXES[charFilterPrefix] || [charFilterPrefix];
                filtered = filtered.filter(function(line) {
                    return allowed.includes(getLinePrefix(line));
                });
            }
            // Hide unknown characters if checkbox is checked
            if (window.hideUnknownCharsChecked) {
                filtered = filtered.filter(function(line) {
                    var p = getLinePrefix(line);
                    if (!p) return true;
                    return !!CHAR_MAP[p];
                });
            }
            // Hide event references if checkbox is checked
            if (window.hideEventRefsChecked) {
                filtered = filtered.filter(function(line) {
                    return !isEventReferenceLine(line);
                });
            }
            return filtered;
        }

        function getActiveLines() {
            if (searchMode) {
                return searchResults.length > 0
                    ? filterByChar(searchResults)
                    : ['', '', 'No results found.'];
            }
            return filterByChar(allLines);
        }

        // ── Fill-then-trim pagination ────────────────────────
        // Ask the browser whether content fits rather than guessing line heights.
        function fillPageDiv(div, lines, startIdx) {
            if (startIdx >= lines.length) {
                div.innerHTML = '';
                return lines.length;
            }
            var maxH = div.clientHeight;
            var lo = 1, hi = Math.min(lines.length - startIdx, 400), best = 1;
            while (lo <= hi) {
                var mid = (lo + hi) >> 1;
                div.innerHTML = lines.slice(startIdx, startIdx + mid).map(formatLine).join('\n');
                if (div.scrollHeight <= maxH) { best = mid; lo = mid + 1; }
                else { hi = mid - 1; }
            }
            div.innerHTML = lines.slice(startIdx, startIdx + best).map(formatLine).join('\n');
            return startIdx + best;
        }

        // Fill the current spread and cache the start of the next one.
        // Returns true if this is the last spread.
        function fillSpread(spreadIdx) {
            var lines = getActiveLines();
            var leftStart = lineStarts[spreadIdx] || 0;
            var rightStart = fillPageDiv(textL, lines, leftStart);
            var afterRight  = fillPageDiv(textR, lines, rightStart);
            lineStarts[spreadIdx + 1] = afterRight;
            if (afterRight >= lines.length) lastContentSpread = spreadIdx;
            return afterRight >= lines.length;
        }

        function resetPagination() {
            lineStarts = [0];
            contentSpread = 0;
            lastContentSpread = 0;
            resetMobilePagination();
        }

        // ── Sizing ──────────────────────────────────────────────
        function fitBook() {
            if (!openW || !openH) return;
            var vw = window.innerWidth * 0.98;
            var vh = window.innerHeight * 0.96;
            var s = Math.min(vw / openW, vh / openH) * 1.4;
            book.style.width  = Math.round(openW * s) + 'px';
            book.style.height = Math.round(openH * s) + 'px';
        }

        // ── Line formatting ─────────────────────────────────
        function escapeHtml(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function formatLinePlain(line) {
            var colonIdx = line.indexOf(': ');
            if (colonIdx === -1) return line;

            var eventName = line.substring(0, colonIdx);
            var dialogue = line.substring(colonIdx);
            var underIdx = eventName.indexOf('_');
            var fullPrefix = (underIdx !== -1 ? eventName.substring(0, underIdx) : eventName).toLowerCase();
            var charInfo = CHAR_MAP[fullPrefix] || CHAR_MAP[fullPrefix.substring(0, 3)] || { name: 'Unknown', initials: fullPrefix };

            if (prefixMode === 'name') {
                return charInfo.name + dialogue;
            } else if (prefixMode === 'initials') {
                return charInfo.initials + dialogue;
            }
            return line;
        }

        function formatLine(line) {
            // Split at first ": " to separate event name from dialogue
            var colonIdx = line.indexOf(': ');
            if (colonIdx === -1) return escapeHtml(line);

            var eventName = line.substring(0, colonIdx);
            var dialogue = line.substring(colonIdx); // includes ": "
            var underIdx = eventName.indexOf('_');
            var prefix3 = (underIdx !== -1 ? eventName.substring(0, underIdx) : eventName).toLowerCase();
            var charInfo = CHAR_MAP[prefix3] || CHAR_MAP[prefix3.substring(0, 3)] || { name: 'Unknown', initials: prefix3 };

            // Detect conversation events and extract the conversation key.
            // Event format: pXX_<conversationKey>_X_NN  e.g. pwh_wizard_tower_conversation_eight_d_01
            // Key = everything after the 4-char char-prefix (pXX_) up to the last _X_NN suffix.
            var convKey = null;
            var convMatch = eventName.match(/^[a-z]{3}_(.+_conversation_.+?)(?:_[a-z]_\d+|_\d+)?$/i);
            if (convMatch) {
                convKey = convMatch[1]; // e.g. "wizard_tower_conversation_eight"
            }

            var prefixText;
            if (prefixMode === 'event') {
                prefixText = escapeHtml(eventName);
            } else if (prefixMode === 'name') {
                prefixText = escapeHtml(charInfo.name);
            } else if (prefixMode === 'initials') {
                prefixText = escapeHtml(charInfo.initials);
            } else {
                prefixText = escapeHtml(eventName);
            }

            var convBadge = '';
            if (convKey) {
                var badgeLabel = (prefixMode === 'initials' || prefixMode === 'event') ? '[C]' : '[CONV]';
                convBadge = '<span class="conv-badge" data-conv-key="' + escapeHtml(convKey) + '">' + badgeLabel + '</span>';
            }

            if (charInfo.color) {
                var textCol = charInfo.textColor || '#ffffff';
                return '<span class="line-prefix" data-char="' + prefix3 + '" '
                    + 'style="--prefix-bg:' + charInfo.color + '; --prefix-color:' + textCol + ';"'
                    + '>' + prefixText + '</span>' + convBadge + escapeHtml(dialogue);
            }
            return prefixText + convBadge + escapeHtml(dialogue);
        }

        function formatLines(text) {
            var lines = text.split('\n');
            var out = [];
            for (var i = 0; i < lines.length; i++) {
                out.push(formatLine(lines[i]));
            }
            return out.join('\n');
        }

        // ── Display helpers ─────────────────────────────────────
        function isMobile() {

        function updateModeButtons() {

            readerBtn.style.opacity = viewMode === 'reader' ? '1' : '0.45';
            tomeBtn.style.borderColor = viewMode === 'tome' ? '#c4a265' : '#5a3a1a';
            readerBtn.style.borderColor = viewMode === 'reader' ? '#c4a265' : '#5a3a1a';

            var darkSection = document.getElementById('readerDarkSection');

            if (darkSection) darkSection.style.display = viewMode === 'reader' ? 'flex' : 'none';
            if (darkDivider) darkDivider.style.display = viewMode === 'reader' ? '' : 'none';

        function applyReaderTheme() {
            var reader = document.getElementById('mobileReader');
            var text = document.getElementById('mobileReaderText');
            var prev = document.getElementById('mobilePrev');
            var next = document.getElementById('mobileNext');
            if (!reader) return;
            if (readerDark) {

        // Seek reader to the page containing targetLineIdx without resetting pagination from scratch.
        function seekReaderToLine(targetLineIdx) {
            resetMobilePagination();
            document.getElementById('mobileReader').style.display = 'flex';
            applyReaderTheme();
            updateReaderPosition();
            state = 'content';
            if (targetLineIdx < 0) {
                fillMobilePage(0);
                return;
            }
            var el = document.getElementById('mobileReaderText');
            el.style.fontSize = FONT_SIZE + 'px';
            el.style.whiteSpace = 'pre-wrap';
            var lines = getActiveLines();
            var startPage = shouldShowIntro() ? 1 : 0;
            mobilePageStarts[startPage] = 0;
            var p = startPage;
            while (true) {
                var end = fillPageDiv(el, lines, mobilePageStarts[p]);
                mobilePageStarts[p + 1] = end;
                if (end > targetLineIdx || end >= lines.length) {
                    mobilePage = p;
                    break;
                }
                p++;
                mobilePageStarts[p] = end;
            }
            fillMobilePage(mobilePage);
        }

        // Seek tome to the spread containing targetLineIdx.
        function seekTomeToLine(targetLineIdx) {
            clearText();
            if (targetLineIdx < 0) {
                setBaseImage('closed');
                state = 'closed';
                return;
            }
            setBaseImage('open');
            state = 'content';
            lineStarts = [0];
            contentSpread = 0;
            lastContentSpread = 0;
            var lines = getActiveLines();
            var spread = 0;
            while (true) {
                var leftStart = lineStarts[spread] || 0;
                var rightStart = fillPageDiv(textL, lines, leftStart);
                var afterRight = fillPageDiv(textR, lines, rightStart);
                lineStarts[spread + 1] = afterRight;
                if (afterRight > targetLineIdx || afterRight >= lines.length) {
                    contentSpread = spread;
                    if (afterRight >= lines.length) lastContentSpread = spread;
                    break;
                }
                spread++;
                lineStarts[spread] = afterRight;
            }
            fillSpread(contentSpread);
        }

        function setViewMode(mode) {
            if (viewMode === mode) return;
            // Save current position as a line index before switching
            if (viewMode === 'reader') {
                savedLineIdx = (mobilePage === 0 && shouldShowIntro())
                    ? -1
                    : (mobilePageStarts[mobilePage] !== undefined ? mobilePageStarts[mobilePage] : 0);
            } else {
                if (state === 'content') {
                    var spreadStart = lineStarts[contentSpread] !== undefined ? lineStarts[contentSpread] : 0;
                    var spreadEnd = lineStarts[contentSpread + 1];
                    // Preserve savedLineIdx if it still falls within the current spread,
                    // meaning the user hasn't navigated since the last view switch.
                    var inSpread = spreadEnd !== undefined && savedLineIdx >= spreadStart && savedLineIdx < spreadEnd;
                    if (!inSpread) {
                        savedLineIdx = spreadStart;
                    }
                } else {
                    savedLineIdx = -1;
                }
            }
            viewMode = mode;
            updateModeButtons();
            if (mode === 'reader') {
                var scene = document.querySelector('.scene');
                if (scene) scene.style.display = 'none';
                seekReaderToLine(savedLineIdx);
            } else {
                document.getElementById('mobileReader').style.display = 'none';
                updateReaderPosition();
                var scene2 = document.querySelector('.scene');
                if (scene2) scene2.style.display = '';
                seekTomeToLine(savedLineIdx);
            }
        }

        function resetMobilePagination() {
            mobilePageStarts = [0];
            mobilePage = 0;
        }

        function shouldShowIntro() {
            return !searchMode && charFilterPrefix === 'all';
        }

        function fillMobilePage(pageIdx) {
            var el = document.getElementById('mobileReaderText');
            el.style.fontSize = FONT_SIZE + 'px';
            el.style.textAlign = readerCentered ? 'center' : 'left';
            if (pageIdx === 0 && shouldShowIntro()) {
                el.style.whiteSpace = 'normal';
                el.innerHTML = firstPageHtmlReader;
                mobilePageStarts[1] = 0;
                document.getElementById('mobilePrev').disabled = true;
                document.getElementById('mobileNext').disabled = false;
                document.getElementById('mobilePageLabel').textContent = 'Page 1';
                return;
            }
            el.style.whiteSpace = 'pre-wrap';
            var lines = getActiveLines();
            var start = mobilePageStarts[pageIdx] !== undefined ? mobilePageStarts[pageIdx] : 0;
            var end = fillPageDiv(el, lines, start);
            mobilePageStarts[pageIdx + 1] = end;
            var isLast = end >= lines.length;
            document.getElementById('mobilePrev').disabled = (pageIdx === 0);
            document.getElementById('mobileNext').disabled = isLast;
            document.getElementById('mobilePageLabel').textContent = 'Page ' + (pageIdx + 1);
        }

        function openMobileReader() {
            var scene = document.querySelector('.scene');
            if (scene) scene.style.display = 'none';
            resetMobilePagination();
            document.getElementById('mobileReader').style.display = 'flex';
            applyReaderTheme();
            updateReaderPosition();
            fillMobilePage(0);
            state = 'content';

        function closeMobileReader() {

            setBaseImage('closed');

                }

        // ── Flip animation ──────────────────────────────────────
        function doFlip(opts) {
            // opts: { fromImg, toKey, direction, newText, onDone }
            // newText: { spreadIdx } or null
            busy = true;
            book.classList.add('busy');
            var duration = 700;
            var closing = (opts.direction === 'back');

            // — Flip layer: clipped to turning half (right side for forward) —
            var layer = document.createElement('div');
            layer.className = 'flip-layer';

            var flipImg = document.createElement('img');
            flipImg.src = opts.fromImg;
            if (opts.fromImg === IMAGES.closed) {
                flipImg.style.objectPosition = 'right center';
            }
            layer.appendChild(flipImg);

            // Add old right text to the flip layer so it rotates away with the page
            if (!closing && opts.oldRightText) {
                var flipRightText = document.createElement('div');
                flipRightText.className = 'page-text right';
                flipRightText.style.pointerEvents = 'none';
                flipRightText.style.fontFamily = FONT_FAMILY;
                flipRightText.style.fontSize = FONT_SIZE + "px";
                flipRightText.innerHTML = formatLines(opts.oldRightText);
                layer.appendChild(flipRightText);
            }

            // Add old left text to the flip layer when going back so it rotates away
            if (closing && opts.oldLeftText) {
                var flipLeftText = document.createElement('div');
                flipLeftText.className = 'page-text left';
                flipLeftText.style.pointerEvents = 'none';
                flipLeftText.style.fontFamily = FONT_FAMILY;
                flipLeftText.style.fontSize = FONT_SIZE + "px";
                flipLeftText.innerHTML = formatLines(opts.oldLeftText);
                layer.appendChild(flipLeftText);
            }

            var clip = closing
                ? 'inset(0 50% 28% 0)'
                : 'inset(0 0 0 50%)';
            layer.style.clipPath = clip;
            layer.style.webkitClipPath = clip;
            layer.style.backfaceVisibility = 'hidden';

            // — Old left text layer: visible in first half, covered by back layer —
            var oldLeftLayer = null;
            if (!closing && opts.oldLeftText) {
                oldLeftLayer = document.createElement('div');
                oldLeftLayer.className = 'flip-layer';
                // Clip to left half, exclude bottom 28% to keep bookmark stationary
                oldLeftLayer.style.clipPath = 'inset(0 50% 28% 0)';
                oldLeftLayer.style.webkitClipPath = 'inset(0 50% 28% 0)';
                oldLeftLayer.style.zIndex = '1';

                var oldLeftImg = document.createElement('img');
                oldLeftImg.src = opts.fromImg;
                oldLeftLayer.appendChild(oldLeftImg);

                var oldLeftText = document.createElement('div');
                oldLeftText.className = 'page-text left';
                oldLeftText.style.pointerEvents = 'none';
                oldLeftText.style.fontFamily = FONT_FAMILY;
                oldLeftText.style.fontSize = FONT_SIZE + "px";
                oldLeftText.innerHTML = formatLines(opts.oldLeftText);
                oldLeftLayer.appendChild(oldLeftText);
            }

            // — Back-of-page layer: shows new left text arriving with the flip —
            var backLayer = null;
            if (!closing && opts.newText) {
                backLayer = document.createElement('div');
                backLayer.className = 'flip-layer';
                // Clip to left half, exclude bottom 28% to keep bookmark stationary
                backLayer.style.clipPath = 'inset(0 50% 28% 0)';
                backLayer.style.webkitClipPath = 'inset(0 50% 28% 0)';

                var backImg = document.createElement('img');
                backImg.src = IMAGES.open;
                backLayer.appendChild(backImg);

                // Start flipped (hidden via backface), rotate into view
                backLayer.style.transform = 'rotateY(180deg)';
                backLayer.style.backfaceVisibility = 'hidden';
            } else if (!closing && opts.backImage) {
                // Back of a non-content page (e.g. inside of book cover)
                backLayer = document.createElement('div');
                backLayer.className = 'flip-layer';
                // Clip to left half, exclude bottom 28% to keep bookmark stationary
                backLayer.style.clipPath = 'inset(0 50% 28% 0)';
                backLayer.style.webkitClipPath = 'inset(0 50% 28% 0)';

                var backCoverImg = document.createElement('img');
                backCoverImg.src = opts.backImage;
                backLayer.appendChild(backCoverImg);

                backLayer.style.transform = 'rotateY(180deg)';
                backLayer.style.backfaceVisibility = 'hidden';
            }

            // Shadows
            var spine = document.createElement('div');
            spine.className = 'spine-shadow';
            spine.style.opacity = '0';

            var sweep = document.createElement('div');
            sweep.className = 'sweep-shadow';
            sweep.style.background = closing
                ? 'linear-gradient(to right, transparent, rgba(0,0,0,0.18))'
                : 'linear-gradient(to left, transparent, rgba(0,0,0,0.18))';

            book.appendChild(layer);
            if (oldLeftLayer) book.appendChild(oldLeftLayer);
            if (backLayer) book.appendChild(backLayer);
            book.appendChild(spine);
            book.appendChild(sweep);

            // Set destination image immediately; delay right text slightly
            // so the flip layer is fully rendered before text appears underneath.
            setBaseImage(opts.toKey);
            clearText();

            setTimeout(function () {
                if (opts.newText) {
                    showText(opts.newText.spreadIdx);

                if (opts.showFirstPageText) {
                    textR.style.fontFamily = "'Times New Roman', serif";
                    textR.style.fontSize = FONT_SIZE + 'px';
                    textR.innerHTML = firstPageHtml;

            // Animate flip layer (old right page rotating away)
            var angle = closing ? 180 : -180;
            layer.animate([
                { transform: 'rotateY(0deg)' },
                { transform: 'rotateY(' + angle + 'deg)' }
            ], {
                duration: duration,
                easing: 'cubic-bezier(0.25, 0.1, 0.25, 1)',

                    { transform: 'rotateY(180deg)' },
                    { transform: 'rotateY(0deg)' }
                ], {
                    duration: duration,
                    easing: 'cubic-bezier(0.25, 0.1, 0.25, 1)',

            if (oldLeftLayer && !backLayer) {

                    { opacity: 0 }
                ], {
                    duration: duration * 0.4,
                    easing: 'ease-out',
                    fill: 'forwards'

            spine.animate([
                { opacity: 0 },
                { opacity: 1, offset: 0.35 },
                { opacity: 1, offset: 0.65 },
                { opacity: 0 }
            ], { duration: duration, easing: 'ease-in-out' });

            if (closing) {
                sweep.animate([
                    { left: '5%',  width: '0%',  opacity: 0 },
                    { left: '25%', width: '20%', opacity: 0.8, offset: 0.4 },
                    { left: '55%', width: '15%', opacity: 0.5, offset: 0.75 },
                    { left: '75%', width: '0%',  opacity: 0 }
                ], { duration: duration, easing: 'ease-in-out' });
            } else {
                sweep.animate([
                    { left: '75%', width: '0%',  opacity: 0 },
                    { left: '40%', width: '20%', opacity: 0.8, offset: 0.4 },
                    { left: '15%', width: '15%', opacity: 0.5, offset: 0.75 },
                    { left: '5%',  width: '0%',  opacity: 0 }
                ], { duration: duration, easing: 'ease-in-out' });
            }

            setTimeout(function () {
                layer.remove();
                if (oldLeftLayer) oldLeftLayer.remove();
                if (backLayer) backLayer.remove();
                spine.remove();
                sweep.remove();
                // Now show the left text as flat on the base layer
                if (opts.newText) {
                    showText(opts.newText.spreadIdx);
                }
                busy = false;
                book.classList.remove('busy');
                if (opts.onDone) opts.onDone();
            }, duration + 30);
        }

        // ── Click handler / state machine ───────────────────────
        function handleClick() {
            if (busy) return;

            switch (state) {
                case 'closed':
                    if (useReader()) {
                        openMobileReader();
                    } else {
                        // Open cover → first page
                        doFlip({
                            fromImg: IMAGES.closed,
                            toKey: 'firstPage',
                            direction: 'forward',
                            showFirstPageText: true,
                            onDone: function () { state = 'first_page'; showFirstPage(); }
                        });
                    }
                    break;

                case 'first_page':
                    if (useReader()) {
                        openMobileReader();
                    } else {
                        // First page → first content spread
                        contentSpread = 0;
                        doFlip({
                            fromImg: IMAGES.firstPage,
                            toKey: 'open',
                            direction: 'forward',
                            newText: { spreadIdx: 0 },
                            onDone: function () { state = 'content'; }
                        });
                    }
                    break;

                case 'content': {
                    if (useReader()) break;
                    var isLast = lineStarts[contentSpread + 1] !== undefined &&
                                 lineStarts[contentSpread + 1] >= getActiveLines().length;
                    if (!isLast) {
                        var nextSpread = contentSpread + 1;
                        doFlip({
                            fromImg: IMAGES.open,
                            toKey: 'open',
                            direction: 'forward',
                            newText: { spreadIdx: nextSpread },
                            onDone: function () { contentSpread = nextSpread; }
                        });
                    } else {
                        doFlip({
                            fromImg: IMAGES.open,
                            toKey: 'lastPage',
                            direction: 'forward',
                            onDone: function () { state = 'last_page'; clearText(); }
                        });
                    }
                    break;
                }

                case 'last_page':
                    doFlip({
                        fromImg: IMAGES.lastPage,
                        toKey: 'closed',
                        direction: 'back',
                        onDone: function () {
                            state = 'closed';
                            contentSpread = 0;
                        }
                    });
                    break;
            }
        }

        function handleClickBack() {
            if (busy) return;

            switch (state) {
                case 'closed':
                    // Can't go back from closed
                    break;

                case 'first_page':
                    // Back to closed
                    doFlip({
                        fromImg: IMAGES.firstPage,
                        toKey: 'closed',
                        direction: 'back',
                        onDone: function () { state = 'closed'; clearText(); }
                    });
                    break;

                case 'content':
                    if (useReader()) {
                        closeMobileReader();
                        break;
                    }
                    if (contentSpread > 0) {
                        var prevSpread = contentSpread - 1;
                        doFlip({
                            fromImg: IMAGES.open,
                            toKey: 'open',
                            direction: 'back',
                            newText: { spreadIdx: prevSpread },
                            onDone: function () { contentSpread = prevSpread; }
                        });
                    } else {
                        // Back to first page
                        doFlip({
                            fromImg: IMAGES.open,
                            toKey: 'firstPage',
                            direction: 'back',
                            showFirstPageText: true,
                            onDone: function () { state = 'first_page'; }
                        });
                    }
                    break;

                case 'last_page':
                    doFlip({
                        fromImg: IMAGES.lastPage,
                        toKey: 'open',
                        direction: 'back',
                        newText: { spreadIdx: lastContentSpread },
                        onDone: function () { state = 'content'; contentSpread = lastContentSpread; }
                    });
                    break;
            }
        }

        // ── Init ────────────────────────────────────────────────
        // Track hide event refs / unknown chars state globally
        window.hideEventRefsChecked = true;
        window.hideUnknownCharsChecked = true;

        Promise.all([preloadImages(), loadText()]).then(function () {
            setBaseImage('closed');
            clearText();
            fitBook();
            viewMode = isMobile() ? 'reader' : 'tome';
            updateModeButtons();
            if (useReader()) {
                openMobileReader();
            }
            window.addEventListener('resize', function () {
                fitBook();
                var newMode = isMobile() ? 'reader' : 'tome';
                if (viewMode !== newMode) {
                    setViewMode(newMode);
                } else if (useReader()) {
                    var lineIdx = (mobilePage === 0 && shouldShowIntro())
                        ? -1
                        : (mobilePageStarts[mobilePage] !== undefined ? mobilePageStarts[mobilePage] : 0);
                    seekReaderToLine(lineIdx);
                } else if (state === 'content') {
                    resetPagination();
                    showText(0);
                }
            });
            // ── Pointer / touch interaction ─────────────────────
            var pointerDown = null; // { x, y, target }

            function onPointerDown(x, y, target) {
                pointerDown = { x: x, y: y, target: target };
            }

            function isConvBadge(el) {
                return el && (el.classList.contains('conv-badge') || (el.closest && el.closest('.conv-badge')));
            }

            function onPointerUp(x, y, target) {
                if (!pointerDown) return;
                if (isConvBadge(pointerDown.target) || isConvBadge(target)) {
                    pointerDown = null;
                    return;
                }
                var dx = x - pointerDown.x;
                var dy = y - pointerDown.y;
                var dist = Math.sqrt(dx * dx + dy * dy);
                pointerDown = null;

                // Check for text selection
                var sel = window.getSelection();
                if (sel && sel.toString().length > 0) return;

                // Swipe detection (horizontal > 40px and more horizontal than vertical)
                if (Math.abs(dx) > 40 && Math.abs(dx) > Math.abs(dy) * 1.5) {
                    if (!useReader() || state !== 'content') {
                        if (dx < 0) {
                            // Swipe left → forward
                            handleClick();
                        } else {
                            // Swipe right → back (go to previous page)
                            handleClickBack();
                        }
                    }
                    return;
                }

                // Tap (short distance) — left side goes back, right side goes forward
                if (dist <= 5) {
                    if (useReader() && (state === 'closed' || state === 'first_page')) {
                        openMobileReader();
                        return;
                    }
                    var bookRect = book.getBoundingClientRect();
                    var midX = bookRect.left + bookRect.width / 2;
                    if (x < midX) {
                        handleClickBack();
                    } else {
                        handleClick();
                    }
                }
            }

            // Mouse events
            book.addEventListener('mousedown', function (e) {
                onPointerDown(e.clientX, e.clientY, e.target);
            });
            book.addEventListener('mouseup', function (e) {
                onPointerUp(e.clientX, e.clientY, e.target);
            });

            // Touch events
            book.addEventListener('touchstart', function (e) {
                var t = e.touches[0];
                onPointerDown(t.clientX, t.clientY, t.target);
            }, { passive: true });
            book.addEventListener('touchend', function (e) {
                var t = e.changedTouches[0];
                onPointerUp(t.clientX, t.clientY, t.target);
            });

            // ── Mobile reader controls ───────────────────────────
            document.getElementById('readerAlignBtn').addEventListener('click', function () {
                readerCentered = !readerCentered;
                var btn = document.getElementById('readerAlignBtn');
                btn.textContent = readerCentered ? 'Center' : 'Left';
                btn.style.color = readerCentered ? '#c4a265' : '#a08050';
                btn.style.borderColor = readerCentered ? '#c4a265' : '#5a3a1a';
                var el = document.getElementById('mobileReaderText');
                el.style.textAlign = readerCentered ? 'center' : 'left';
            });
            document.getElementById('readerDarkBtn').addEventListener('click', function () {
                readerDark = !readerDark;
                var btn = document.getElementById('readerDarkBtn');
                btn.textContent = readerDark ? 'Dark' : 'Light';
                btn.style.color = readerDark ? '#c4a265' : '#a08050';
                btn.style.borderColor = readerDark ? '#c4a265' : '#5a3a1a';
                applyReaderTheme();
            });
            document.getElementById('mobilePrev').addEventListener('click', function () {
                if (mobilePage <= 0) return;
                mobilePage--;
                fillMobilePage(mobilePage);
            });
            document.getElementById('mobileNext').addEventListener('click', function () {
                if (document.getElementById('mobileNext').disabled) return;
                mobilePage++;
                fillMobilePage(mobilePage);
            });
            // Swipe within reader to turn pages
            var mrSwipeStart = null;
            document.getElementById('mobileReaderText').addEventListener('touchstart', function (e) {
                var t = e.touches[0];
                mrSwipeStart = { x: t.clientX, y: t.clientY };
            }, { passive: true });
            document.getElementById('mobileReaderText').addEventListener('touchend', function (e) {
                if (!mrSwipeStart) return;
                var t = e.changedTouches[0];
                var dx = t.clientX - mrSwipeStart.x;
                var dy = t.clientY - mrSwipeStart.y;
                mrSwipeStart = null;
                if (Math.abs(dx) > 40 && Math.abs(dx) > Math.abs(dy) * 1.5) {
                    if (dx < 0) {
                        if (!document.getElementById('mobileNext').disabled) {
                            mobilePage++;
                            fillMobilePage(mobilePage);
                        }
                    } else {
                        if (mobilePage > 0) {
                            mobilePage--;
                            fillMobilePage(mobilePage);
                        }
                    }
                }
            });

            // ── Conversation badge click ─────────────────────────
            function onTextClick(e) {
                var badge = e.target.closest ? e.target.closest('.conv-badge') : null;
                if (!badge && e.target.classList.contains('conv-badge')) badge = e.target;
                if (!badge) return;
                e.stopPropagation();
                var key = badge.getAttribute('data-conv-key');
                if (!key) return;
                searchInput.value = key;
                searchClear.style.display = 'block';
                searchMode = true;
                var lowerKey = key.toLowerCase();
                searchResults = [];
                // Match by exact extracted conversation key to avoid e.g. "eight" matching "eighteen"
                for (var k = 0; k < allLines.length; k++) {
                    var ci = allLines[k].indexOf(': ');
                    if (ci === -1) continue;
                    var evn = allLines[k].substring(0, ci);
                    var km = evn.match(/^[a-z]{3}_(.+_conversation_.+?)(?:_[a-z]_\d+|_\d+)?$/i);
                    if (km && km[1].toLowerCase() === lowerKey) {
                        searchResults.push(allLines[k]);
                    }
                }
                // Sort by event name excluding the pXX_ character prefix
                searchResults.sort(function (a, b) {
                    var aName = a.indexOf(': ') !== -1 ? a.substring(0, a.indexOf(': ')) : a;
                    var bName = b.indexOf(': ') !== -1 ? b.substring(0, b.indexOf(': ')) : b;
                    // Strip leading pXX_ (3 chars + underscore)
                    var aKey = aName.length > 4 ? aName.substring(4) : aName;
                    var bKey = bName.length > 4 ? bName.substring(4) : bName;
                    return aKey < bKey ? -1 : aKey > bKey ? 1 : 0;
                });
                var active = getActiveLines();
                if (active.length === 0) {
                    searchInfo.textContent = 'No results found.';
                    resetPagination();
                } else {
                    searchInfo.textContent = active.length + ' result(s) found.';
                    resetPagination();
                }
                contentSpread = 0;
                if (state === 'content') {
                    showText(0);
                } else {
                    if (useReader()) {
                        openMobileReader();
                    } else {
                        state = 'content';
                        setBaseImage('open');
                        showText(0);
                    }
                }
            }
            textL.addEventListener('click', onTextClick);
            textR.addEventListener('click', onTextClick);
            document.getElementById('mobileReaderText').addEventListener('click', onTextClick);

            // ── Menu logic ──────────────────────────────────────
            var menu = document.getElementById('sideMenu');
            var toggle = document.getElementById('menuToggle');
            var searchInput = document.getElementById('searchInput');
            var searchBtn = document.getElementById('searchBtn');
            var searchClear = document.getElementById('searchClear');
            var searchInfo = document.getElementById('searchInfo');

            var downloadBtn = document.getElementById('downloadBtn');
            var hideEventRefs = document.getElementById('hideEventRefs');
            var hideUnknownChars = document.getElementById('hideUnknownChars');
            // Hide unknown characters checkbox
            hideUnknownChars.addEventListener('change', function() {
                window.hideUnknownCharsChecked = hideUnknownChars.checked;
                resetPagination();
                if (state === 'content') showText(0);
            });
            // Hide event references checkbox
            hideEventRefs.addEventListener('change', function() {
                window.hideEventRefsChecked = hideEventRefs.checked;
                resetPagination();
                if (state === 'content') showText(0);
            });

            // Toggle menu
            toggle.addEventListener('click', function (e) {
                e.stopPropagation();
                menu.classList.toggle('collapsed');
                toggle.textContent = menu.classList.contains('collapsed') ? '▶' : '◀';
                updateReaderPosition();
            });

            // Mode toggle buttons
            document.getElementById('modeTomeBtn').addEventListener('click', function () { setViewMode('tome'); });
            document.getElementById('modeReaderBtn').addEventListener('click', function () { setViewMode('reader'); });

            // Start collapsed on small screens
            if (window.innerWidth < 768) {
                menu.classList.add('collapsed');
                toggle.textContent = '▶';
            }

            // Prevent menu clicks from flipping pages
            menu.addEventListener('click', function (e) { e.stopPropagation(); });
            menu.addEventListener('touchend', function (e) { e.stopPropagation(); });

            // ── Search ──────────────────────────────────────────
            function doSearch() {
                var query = searchInput.value.trim();
                if (!query) { searchInfo.textContent = ''; return; }
                var lowerQ = query.toLowerCase();
                searchResults = [];
                for (var i = 0; i < allLines.length; i++) {
                    if (allLines[i].toLowerCase().indexOf(lowerQ) !== -1) {
                        searchResults.push(allLines[i]);
                    }
                }

                searchMode = true;
                var active = getActiveLines();
                if (active.length === 0 || (searchResults.length === 0)) {
                    searchInfo.textContent = 'No results found.';
                    resetPagination();
                } else {
                    searchInfo.textContent = active.length + ' result(s) found.';
                    resetPagination();
                }

                // Navigate to content if not already there
                contentSpread = 0;
                if (state === 'content') {
                    showText(0);
                } else {
                    if (useReader()) {
                        openMobileReader();
                    } else {
                        state = 'content';
                        setBaseImage('open');
                        showText(0);
                    }
                }
            }

            searchBtn.addEventListener('click', doSearch);
            searchInput.addEventListener('keydown', function (e) {
                if (e.key === 'Enter') doSearch();
            });
            searchInput.addEventListener('input', function () {
                searchClear.style.display = searchInput.value ? 'block' : 'none';
                if (searchInput.value.trim() === '' && searchMode) {
                    searchMode = false;
                    searchInfo.textContent = '';
                    resetPagination();
                    if (state === 'content') showText(0);
                }
            });
            searchClear.addEventListener('click', function () {
                searchInput.value = '';
                searchClear.style.display = 'none';
                if (searchMode) {
                    searchMode = false;
                    searchInfo.textContent = '';
                    resetPagination();
                    if (state === 'content') showText(0);
                }
                searchInput.focus();
            });

            // ── Download ────────────────────────────────────────
            downloadBtn.addEventListener('click', function () {
                var a = document.createElement('a');
                a.href = TEXT_FILE;
                a.download = 'Tome of Quotes.txt';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            });

            // ── Download current text ────────────────────────────
            var downloadCurrentBtn = document.getElementById('downloadCurrentBtn');
            downloadCurrentBtn.addEventListener('click', function () {
                var lines = getActiveLines();
                var formatted = [];
                for (var i = 0; i < lines.length; i++) {
                    formatted.push(formatLinePlain(lines[i]));
                }
                var blob = new Blob([formatted.join('\n')], { type: 'text/plain' });
                var url = URL.createObjectURL(blob);
                var a = document.createElement('a');
                a.href = url;
                a.download = 'Tome of Quotes - Current.txt';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            });

            // ── Prefix ─────────────────────────────────────────
            var prefixSelect = document.getElementById('prefixSelect');
            prefixSelect.addEventListener('change', function () {
                prefixMode = prefixSelect.value;
                if (state === 'content') {
                    showText(contentSpread);
                }
            });

            // ── Character Filter ─────────────────────────────────
            var charFilterEl = document.getElementById('charFilter');
            charFilterEl.addEventListener('change', function () {
                charFilterPrefix = charFilterEl.value;
                resetPagination();
                if (state === 'content') showText(0);
            });

            // ── Text Size ────────────────────────────────────────
            var fontSizeSlider = document.getElementById('fontSizeSlider');
            var fontSizeDisplay = document.getElementById('fontSizeDisplay');
            fontSizeSlider.addEventListener('input', function () {
                FONT_SIZE = parseInt(fontSizeSlider.value);
                fontSizeDisplay.textContent = FONT_SIZE + 'px';
                textL.style.fontSize = FONT_SIZE + 'px';
                textR.style.fontSize = FONT_SIZE + 'px';
                if (useReader()) {
                    var lineIdx = (mobilePage === 0 && shouldShowIntro())
                        ? -1
                        : (mobilePageStarts[mobilePage] !== undefined ? mobilePageStarts[mobilePage] : 0);
                    seekReaderToLine(lineIdx);
                } else {
                    resetPagination();
                    if (state === 'content') showText(0);
                    else if (state === 'first_page') showFirstPage();
                }
            });
        });
    })();
    </script>
